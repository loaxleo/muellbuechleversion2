<script>
    // ... (dein data-Array bleibt wie gehabt)

    // Die Funktion sucht jetzt in: buch1/bilder/3.jpg
    function versucheBildZuLaden(imgElement, buchId, bildNummer) {
        // Der Pfad ist nun fix auf deinen Ordner "bilder" eingestellt
        const pfad = `./${buchId}/bilder/${bildNummer}.jpg`;
        
        imgElement.onerror = function() {
            // Falls mal ein Bild doch nicht .jpg ist, hier als Fallback 
            // oder einfach das Bild unsichtbar machen, wenn nicht gefunden
            this.style.display = 'none'; 
        };

        imgElement.src = pfad;
    }

    // Stelle sicher, dass die toggleBildVorschau und rendereReineBildergalerie 
    // diese neue Funktion benutzen (wie im Code unten gezeigt):

    function toggleBildVorschau(rowId, buchId, gefundeneBilder) {
        const previewRow = document.getElementById(`preview-${rowId}`);
        if (!previewRow) return;

        if (previewRow.style.display === 'table-row') {
            previewRow.style.display = 'none';
            return;
        }

        document.querySelectorAll('.preview-row').forEach(r => r.style.display = 'none');
        
        const wrapper = document.getElementById(`wrapper-${rowId}`);
        wrapper.innerHTML = "";

        gefundeneBilder.forEach(bildNummer => {
            const container = document.createElement('div');
            container.className = 'preview-container';
            
            const img = document.createElement('img');
            img.alt = `Seite ${bildNummer}`;
            img.loading = "lazy";
            
            // Hier wird jetzt der korrekte Pfad mit /bilder/ gesetzt
            versucheBildZuLaden(img, buchId, bildNummer);

            const label = document.createElement('div');
            label.className = 'image-label';
            label.innerText = `Seite ${bildNummer}`;

            container.appendChild(img);
            container.appendChild(label);
            wrapper.appendChild(container);
        });

        previewRow.style.display = 'table-row';
    }
    
    // ... (der Rest des Skripts bleibt gleich)
</script>
