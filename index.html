    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #f5f5f5; --sub: #909090; --border: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 800px; padding-bottom: 100px; }
        
        header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: bold; }
        .info-block { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 15px; font-size: 0.85em; line-height: 1.6; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: #333; border-color: #555; }

        /* Suchleiste */
        .search-wrapper { position: fixed; bottom: 15px; left: 15px; right: 15px; z-index: 100; display: flex; justify-content: center; }
        .search-inner { width: 100%; max-width: 800px; position: relative; }
        #searchBar { width: 100%; padding: 15px; background: var(--card); border: 1px solid #444; border-radius: 30px; color: white; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); box-sizing: border-box; transition: all 0.3s ease; }
        #searchBar:focus { border-color: #888; box-shadow: 0 0 15px rgba(255,255,255,0.1); outline: none; }
        #clearBtn { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--sub); font-size: 20px; display: none; }

        /* Dynamischer Fade-Effekt über der Suchleiste */
        .fade-overlay { position: fixed; bottom: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(to top, var(--bg) 40%, transparent 100%); pointer-events: none; z-index: 99; }

        .book-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .book-header { padding: 12px; font-weight: bold; background: rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-top: 1px solid var(--border); }
        .page-col { text-align: right; color: var(--sub); width: 80px; }
        
        .clickable { cursor: pointer; border-left: 3px solid #333; transition: 0.2s; position: relative; }
        .clickable:hover { border-left-color: #fff; background: rgba(255,255,255,0.02); }
        .clickable::after { content: "▼"; position: absolute; right: 15px; font-size: 10px; color: #555; }
        
        .preview-row { display: none; text-align: center; background: #000; }
        .preview-row img { max-width: 100%; height: auto; padding: 10px; border-radius: 8px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding-top: 10px; }
        .gallery-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
    </style>
</head>

function switchTab(tab) {
    currentTab = tab;
    // Suchleiste nur im Listen-Tab anzeigen
    document.querySelector('.search-wrapper').style.display = (tab === 'gallery') ? 'none' : 'flex';
    
    document.getElementById('tabList').className = tab === 'list' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tabGallery').className = tab === 'gallery' ? 'tab-btn active' : 'tab-btn';
    filterData();
}

function filterData() {
    const term = document.getElementById('searchBar').value.toLowerCase();
    document.getElementById('clearBtn').style.display = term.length > 0 ? 'block' : 'none';
    render(term);
}

function clearSearch() { document.getElementById('searchBar').value = ""; filterData(); }

function toggle(id) {
    const row = document.getElementById('prev-' + id);
    row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
}

function render(filter = "") {
    const app = document.getElementById('app');
    app.innerHTML = "";
    const bookIds = ["buch1", "buch2", "buch3", "buch4", "buch5", "buch6", "buch7"];

    if (currentTab === 'list') {
        bookIds.forEach(bId => {
            const items = data.filter(i => i.id === bId && i.text.toLowerCase().includes(filter));
            if(items.length === 0) return;
            
            let html = `<div class="book-section"><div class="book-header">${items[0].book}</div><table>`;
            items.forEach((item, idx) => {
                const rowId = bId + idx;
                const hasImg = available[bId] && available[bId].some(p => item.page.includes(p));
                html += `<tr class="${hasImg ? 'clickable' : ''}" ${hasImg ? `onclick="toggle('${rowId}')"` : ''}>
                            <td>${item.text}</td>
                            <td class="page-col">S. ${item.page}</td>
                         </tr>
                         ${hasImg ? `<tr id="prev-${rowId}" class="preview-row"><td colspan="2"><img src="./${bId}/bilder/${item.page.split('-')[0]}.jpg" alt="Vorschau"></td></tr>` : ''}`;
            });
            html += `</table></div>`;
            app.innerHTML += html;
        });
    } else {
        let html = '<div class="gallery-grid">';
        bookIds.forEach(bId => {
            available[bId].forEach(p => {
                html += `<img src="./${bId}/bilder/${p}.jpg" alt="Bild">`;
            });
        });
        html += '</div>';
        app.innerHTML = html;
    }
}
render();
